name: CI

# Validates the Bun toolchain + the standalone-binary distribution on every push.
# Each OS runner natively EXECUTES its own platform binary (the smoke's build
# phase compiles + runs it), so this matrix closes the Windows-execution gap that
# a single macOS dev box cannot — no Docker/emulation needed in CI.

on:
  push:
    branches: [main, master, 'release/**']
  pull_request:
    branches: [main, master, 'release/**']

jobs:
  # Static gates — OS-independent, so run once. eslint exits 0 on warnings
  # (the consistent-type-imports nits are warn-level by design) but fails on
  # errors; dependency-cruiser enforces the architecture layering rules
  # (no substrate→pipeline, no pipeline→tools, no cycles) at zero violations.
  lint:
    name: lint (eslint + layering)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install workspace deps
        run: bun install
      - name: ESLint
        run: bun run lint
      - name: Dependency layering (dependency-cruiser)
        run: bun run lint:deps

  # Guards the test-isolation invariant: every test must be free of process-global
  # state leakage (no sticky mock.module on shared modules, restored env/fetch, etc.)
  # so the WHOLE suite passes in ONE shared bun process — not just per-file-isolated.
  # `bun run test` (the verify job) forks per file and would HIDE such a leak; this
  # bare run is the only gate that catches a re-introduced sticky mock.module.
  bare-test:
    name: bare bun test (isolation-not-required guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install workspace deps
        run: bun install
      - name: Build (embedded skills needed by tests)
        run: bun run build
      - name: Bare bun test (single shared process — fails on any cross-file leak)
        run: bun test

  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install workspace deps
        run: bun install
      - name: Build (gen embedded skills + tsc workspaces)
        run: bun run build
      - name: Typecheck
        run: bun run typecheck
      - name: Test suite (per-file isolation)
        run: bun run test
      # Build/packaging phase: compiles this OS's binary, runs it natively
      # (--version), verifies embedded skills, and does a real npm pack/install.
      # --skip-docker: the runner IS this OS, so no cross-platform emulation needed.
      - name: Build + packaging validation (native binary execution)
        run: bun scripts/full-smoke/index.mjs --build-only --skip-tests --skip-docker

  # musl (Alpine) is not a standard GitHub runner OS — validate it in an Alpine
  # container, compiling and EXECUTING the linux-x64-musl binary natively.
  verify-musl:
    name: verify (alpine/musl)
    runs-on: ubuntu-latest
    container: node:lts-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install bun + toolchain deps
        run: |
          apk add --no-cache bash unzip libstdc++ libgcc git
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Install workspace deps
        run: bun install
      - name: Build
        run: bun run build
      - name: Compile + execute the musl binary natively
        run: |
          bun scripts/build-binaries.mjs bun-linux-x64-musl
          OUT="$(binaries/bun-linux-x64-musl/mmagent --version)"
          echo "musl binary --version => $OUT"
          echo "$OUT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+' || { echo "musl binary did not run"; exit 1; }
